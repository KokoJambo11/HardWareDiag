# Build HardWareDiag Windows EXE and installer (runs on Windows).
# Repo root = app folder (main.py, requirements.txt, HardwareDiag.spec, HardWareDiag.iss).
# Artifacts: HardwareDiag.exe (portable), HardWareDiag_Setup.exe (installer).

name: Build HardWareDiag (Windows)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build portable EXE (PyInstaller)
        run: pyinstaller HardwareDiag.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" HardWareDiag.iss

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: HardwareDiag-exe
          path: dist/HardwareDiag.exe

      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: HardWareDiag-Setup-exe
          path: Output/HardWareDiag_Setup.exe
