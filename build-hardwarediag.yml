# Build HardWareDiag Windows EXE and installer (runs on Windows).
# Artifacts: HardwareDiag.exe (portable), HardWareDiag_Setup.exe (installer).
# Download from Actions run and place into HardWareDiag-website/downloads/.

name: Build HardWareDiag (Windows)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'HardWareDiag/**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd HardWareDiag
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build portable EXE (PyInstaller)
        run: |
          cd HardWareDiag
          pyinstaller HardwareDiag.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          cd HardWareDiag
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" HardWareDiag.iss

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: HardwareDiag-exe
          path: HardWareDiag/dist/HardwareDiag.exe

      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: HardWareDiag-Setup-exe
          path: HardWareDiag/Output/HardWareDiag_Setup.exe
